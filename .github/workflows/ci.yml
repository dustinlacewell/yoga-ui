name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
          - os: ubuntu-latest
            compiler: clang
          - os: macos-latest
            compiler: clang
          - os: windows-latest
            compiler: msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up compiler (Linux GCC)
        if: matrix.os == 'ubuntu-latest' && matrix.compiler == 'gcc'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-12
          echo "CC=gcc-12" >> $GITHUB_ENV
          echo "CXX=g++-12" >> $GITHUB_ENV

      - name: Set up compiler (Linux Clang)
        if: matrix.os == 'ubuntu-latest' && matrix.compiler == 'clang'
        run: |
          sudo apt-get update
          # clang-18 pairs cleanly with the runner's libstdc++-14; older clang
          # (e.g. 15) cannot parse GCC 14's <format>/<bits/unicode.h> headers.
          sudo apt-get install -y clang-18
          echo "CC=clang-18" >> $GITHUB_ENV
          echo "CXX=clang++-18" >> $GITHUB_ENV

      - name: Configure (Unix)
        if: matrix.os != 'windows-latest'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DYUI_AUTO_FIND_BACKENDS=OFF

      - name: Configure (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake -B build -DYUI_AUTO_FIND_BACKENDS=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Test (Unix)
        if: matrix.os != 'windows-latest'
        run: ctest --test-dir build --output-on-failure

      - name: Test (Windows)
        if: matrix.os == 'windows-latest'
        run: ctest --test-dir build -C Release --output-on-failure
